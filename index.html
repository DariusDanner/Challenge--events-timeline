<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChallengeEU — Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
        --accent: #ff6633;
        --accent-dark: #e0531f;
        --accent-light: #ffe6dc;
        --ink: #16130f;
        --ink-soft: #5c554d;
        --line: #e3ddd4;
        --paper: #f7f4ef;
        --card: #ffffff;
        --radius: 16px;
    }

    body {
        font-family: 'Hanken Grotesk', sans-serif;
        background: var(--paper);
        color: var(--ink);
        line-height: 1.55;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
    }

    .wrap { max-width: 1080px; margin: 0 auto; padding: 1.5rem 1.5rem 5rem; }

    /* ---------- Top nav bar ---------- */
    .navbar {
        display: flex; align-items: center; justify-content: space-between;
        background: var(--ink); color: #fff;
        border-radius: 999px; padding: 0.7rem 1.4rem; margin-bottom: 3rem;
    }
    .brand { display: flex; align-items: center; gap: 0.6rem; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 1.25rem; letter-spacing: -0.02em; }
    .brand .star { width: 22px; height: 22px; flex-shrink: 0; }
    .brand em { font-style: italic; font-weight: 700; }
    .nav-links { display: flex; gap: 1.4rem; font-size: 0.9rem; font-weight: 600; color: #cfc8bf; }
    .nav-links span { cursor: default; }
    .nav-links span.active { color: #fff; }

    /* ---------- Hero ---------- */
    .hero { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 2.5rem; align-items: center; margin-bottom: 3.5rem; }
    .hero h1 { font-family: 'Bricolage Grotesque', sans-serif; font-size: clamp(2.4rem, 5vw, 3.6rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1; margin-bottom: 1.2rem; }
    .hero p { color: var(--ink-soft); font-size: 1.05rem; max-width: 42ch; }
    .hero-art {
        aspect-ratio: 16/11; border-radius: var(--radius);
        background:
            radial-gradient(circle at 70% 30%, rgba(255,102,51,0.25), transparent 55%),
            linear-gradient(135deg, #1d1a16 0%, #2b2620 100%);
        position: relative; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
    }
    .hero-art svg { width: 46%; height: auto; opacity: 0.95; }
    .hero-art::after {
        content: ""; position: absolute; inset: 0;
        background-image: radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px);
        background-size: 14px 14px;
    }

    /* ---------- Controls ---------- */
    .controls-head {
        display: flex; align-items: flex-end; justify-content: space-between;
        gap: 1rem; flex-wrap: wrap; margin-bottom: 1.2rem;
    }
    .count-title { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.9rem; font-weight: 800; letter-spacing: -0.02em; }
    .count-title span { color: var(--accent); }

    .perpage { display: flex; align-items: center; gap: 0.6rem; font-size: 0.9rem; color: var(--ink-soft); font-weight: 600; }
    .perpage select {
        font-family: inherit; font-weight: 600; font-size: 0.9rem;
        border: 1.5px solid var(--ink); border-radius: 999px;
        padding: 0.35rem 0.9rem; background: transparent; cursor: pointer; color: var(--ink);
    }

    .search-row { margin-bottom: 1rem; }
    .search-row input {
        width: 100%; font-family: inherit; font-size: 1rem;
        border: 1.5px solid var(--line); border-radius: 999px;
        padding: 0.8rem 1.2rem; background: var(--card); color: var(--ink);
        transition: border-color .2s, box-shadow .2s;
    }
    .search-row input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-light); }

    .filters { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2.2rem; }
    .pill {
        font-family: inherit; font-size: 0.85rem; font-weight: 600;
        border: 1.5px solid var(--line); background: var(--card); color: var(--ink);
        border-radius: 999px; padding: 0.45rem 1rem; cursor: pointer;
        transition: all .2s; white-space: nowrap;
    }
    .pill:hover { border-color: var(--ink); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* + filters dropdown */
    .filter-menu { position: relative; }
    .pill.more { display: inline-flex; align-items: center; gap: 0.35rem; }
    .dropdown {
        position: absolute; top: calc(100% + 0.5rem); left: 0; z-index: 30;
        background: var(--card); border: 1.5px solid var(--ink); border-radius: 14px;
        padding: 1rem 1.1rem; min-width: 240px; box-shadow: 0 18px 40px rgba(0,0,0,0.12);
        display: none;
    }
    .dropdown.open { display: block; }
    .dropdown h4 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 0.7rem; }
    .dropdown label { display: flex; align-items: center; gap: 0.55rem; padding: 0.3rem 0; font-size: 0.9rem; cursor: pointer; color: var(--ink-soft); }
    .dropdown label:hover { color: var(--ink); }
    .dropdown input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }

    /* ---------- Accordion ---------- */
    .group { border-top: 1px solid var(--line); }
    .group:last-of-type { border-bottom: 1px solid var(--line); }
    .group-head {
        display: flex; align-items: center; gap: 1rem; cursor: pointer;
        padding: 1.15rem 0.5rem; user-select: none; transition: background .2s;
    }
    .group-head:hover { background: rgba(0,0,0,0.02); }
    .group-name { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.25rem; font-weight: 700; flex: 1; letter-spacing: -0.01em; }
    .badge {
        min-width: 2.2rem; text-align: center; font-size: 0.8rem; font-weight: 700;
        color: var(--ink-soft); border: 1.5px dashed var(--line); border-radius: 999px; padding: 0.2rem 0.6rem;
    }
    .chev { width: 22px; height: 22px; flex-shrink: 0; transition: transform .25s; color: var(--accent); }
    .group.collapsed .chev { transform: rotate(-90deg); }

    .group-body { overflow: hidden; transition: max-height .3s ease; }
    .group.collapsed .group-body { max-height: 0 !important; }

    /* ---------- Event row ---------- */
    .event { border-top: 1px dashed var(--line); margin: 0 0.5rem; }
    .event-row {
        display: flex; align-items: center; gap: 1rem; cursor: pointer;
        padding: 0.95rem 0.5rem; transition: background .2s;
    }
    .event-row:hover { background: rgba(255,102,51,0.05); }
    .event-title { flex: 1; font-weight: 600; font-size: 1.02rem; }
    .event-date { font-size: 0.85rem; color: var(--ink-soft); font-weight: 600; white-space: nowrap; }
    .event-arrow { width: 18px; height: 18px; color: var(--ink); flex-shrink: 0; transition: transform .25s; }
    .event.open .event-arrow { transform: rotate(45deg); }

    /* detail */
    .detail { overflow: hidden; max-height: 0; transition: max-height .35s ease; }
    .event.open .detail { max-height: 1200px; }
    .detail-inner { padding: 0.4rem 0.6rem 1.6rem; }
    .detail-card {
        background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 1.4rem 1.5rem;
    }
    .detail-desc { color: var(--ink); margin-bottom: 1.2rem; }
    .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.9rem 1.5rem; margin-bottom: 1.2rem; }
    .meta-item { font-size: 0.9rem; }
    .meta-item .k { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 0.15rem; }
    .meta-item .v { color: var(--ink); }
    .meta-item a { color: var(--ink); }
    .topics { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-bottom: 1.2rem; }
    .topic { background: var(--accent-light); color: var(--accent-dark); font-size: 0.78rem; font-weight: 600; padding: 0.3rem 0.7rem; border-radius: 999px; }
    .register {
        display: inline-flex; align-items: center; gap: 0.4rem; text-decoration: none;
        background: var(--accent); color: #fff; font-weight: 700; font-size: 0.9rem;
        padding: 0.65rem 1.3rem; border-radius: 999px; transition: background .2s;
    }
    .register:hover { background: var(--accent-dark); }

    /* ---------- Pagination ---------- */
    .pager { display: flex; align-items: center; justify-content: flex-end; gap: 0.5rem; margin-top: 2rem; font-size: 0.9rem; font-weight: 600; color: var(--ink-soft); }
    .pager button {
        font-family: inherit; font-weight: 700; min-width: 38px; height: 38px;
        border: 1.5px solid var(--ink); background: transparent; border-radius: 999px; cursor: pointer; color: var(--ink);
        transition: all .2s; padding: 0 0.5rem;
    }
    .pager button:hover:not(:disabled) { background: var(--ink); color: #fff; }
    .pager button:disabled { opacity: 0.3; cursor: not-allowed; }
    .pager .current { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ---------- States ---------- */
    .empty, .loading { text-align: center; padding: 4rem 1rem; color: var(--ink-soft); }
    .spinner { width: 38px; height: 38px; border: 3px solid var(--line); border-top-color: var(--accent); border-radius: 50%; margin: 0 auto 1rem; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 760px) {
        .hero { grid-template-columns: 1fr; }
        .hero-art { order: -1; aspect-ratio: 16/9; }
        .nav-links { display: none; }
        .navbar { border-radius: 18px; }
    }
</style>
</head>
<body>
<div class="wrap">

    <!-- NAV -->
    <div class="navbar">
        <div class="brand">
            <svg class="star" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 2 L23 17 L38 20 L23 23 L20 38 L17 23 L2 20 L17 17 Z" fill="#ff6633"/>
            </svg>
            Challenge<em>EU</em>
        </div>
        <div class="nav-links">
            <span class="active">Events</span>
            <span>About</span>
            <span>Contact</span>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">
        <div>
            <h1>Events &amp;<br>Opportunities</h1>
            <p>Browse upcoming events, workshops, summer schools and calls across the ChallengeEU network. Filter by type or audience and expand any event for the full details.</p>
        </div>
        <div class="hero-art">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 1 L23.5 16.5 L39 20 L23.5 23.5 L20 39 L16.5 23.5 L1 20 L16.5 16.5 Z" fill="#ff6633"/>
            </svg>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls-head">
        <div class="count-title">Events: <span id="totalCount">0</span></div>
        <div class="perpage">
            <span>Per page</span>
            <select id="perPage">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="all">All</option>
            </select>
        </div>
    </div>

    <div class="search-row">
        <input type="text" id="search" placeholder="Search events by name, description or topic…">
    </div>

    <div class="filters" id="filters"></div>

    <!-- LIST -->
    <div id="list">
        <div class="loading"><div class="spinner"></div><p>Loading events…</p></div>
    </div>

    <!-- PAGINATION -->
    <div class="pager" id="pager"></div>

</div>

<script>
    //Google Apps Script URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzSmbMquFtB4jMJB5w8mTbkDRTjIQxNQ4yIYHjujVy-oeFqbFGUimTQ1GHpq8hpYJAF8Q/exec';

    // ---------- state ----------
    let events = [];
    let activeTypes = new Set();      // empty = all
    let activeAudiences = new Set();  // empty = all
    let searchTerm = '';
    let perPage = 20;
    let currentPage = 1;
    let collapsedTypes = new Set();  // types the user has collapsed (default: expanded)
    let openEventIds = new Set();

    // ---------- helpers ----------
    // Find a field value regardless of trailing " *", spelling/spacing or case
    function getField(ev, ...names) {
        for (const n of names) {
            if (ev[n] != null && ev[n] !== '') return ev[n];
            if (ev[n + ' *'] != null && ev[n + ' *'] !== '') return ev[n + ' *'];
        }
        const norm = {};
        for (const k in ev) norm[k.replace(/\*/g, '').trim().toLowerCase()] = ev[k];
        for (const n of names) {
            const key = n.toLowerCase().trim();
            if (norm[key] != null && norm[key] !== '') return norm[key];
        }
        return '';
    }

    function parseDate(value) {
        if (!value) return null;
        if (value instanceof Date) return value;
        const str = String(value).trim();
        if (str.includes('T') || /^\d{4}-\d{2}-\d{2}/.test(str)) {
            const d = new Date(str);
            if (!isNaN(d)) return d;
        }
        const m = str.match(/^(\d{1,2})[-/.](\d{1,2})[-/.](\d{4})$/);
        if (m) return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
        const d = new Date(str);
        return isNaN(d) ? null : d;
    }

    function parseTime(value) {
        if (!value) return '';
        const str = String(value).trim();
        if (str.includes('T')) {
            const d = new Date(str);
            if (!isNaN(d)) return String(d.getUTCHours()).padStart(2, '0') + ':' + String(d.getUTCMinutes()).padStart(2, '0');
        }
        return str;
    }

    function fmtDate(d) {
        if (!d) return '';
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function dateRange(ev) {
        const s = ev._start, e = ev._end;
        if (s && e && e.getTime() !== s.getTime()) {
            const sameYear = s.getFullYear() === e.getFullYear();
            const sStr = s.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: sameYear ? undefined : 'numeric' });
            return sStr + ' – ' + fmtDate(e);
        }
        return fmtDate(s);
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function splitList(value) {
        if (!value) return [];
        return String(value).split(/[|,;]/).map(x => x.trim()).filter(Boolean);
    }

    // ---------- init ----------
    async function init() {
        try {
            const res = await fetch(SCRIPT_URL);
            if (!res.ok) throw new Error('fetch failed');
            const raw = await res.json();

            events = raw.map((ev, i) => {
                const start = parseDate(getField(ev, 'Start Date'));
                const end = parseDate(getField(ev, 'End Date')) || start;
                return {
                    _id: i,
                    _raw: ev,
                    name: getField(ev, 'Event Name'),
                    type: getField(ev, 'Event Type') || 'Other',
                    start, end,
                    _start: start, _end: end,
                    time: parseTime(getField(ev, 'Start Time')),
                    organizer: getField(ev, 'Organizer/Contact Person', 'Organizer/Contact', 'Organizer'),
                    email: getField(ev, 'Contact Email'),
                    location: getField(ev, 'Location'),
                    description: getField(ev, 'Description'),
                    audience: getField(ev, 'Target Audience'),
                    topics: getField(ev, 'Topics', 'Topics/Focus Areas', 'Key Topics'),
                    registration: getField(ev, 'Registration', 'Registration Link', 'Registration/Info Link', 'More Info Link'),
                    notes: getField(ev, 'Additional Notes', 'Additonal Notes')
                };
            }).filter(e => e.name);

            // sort by start date ascending
            events.sort((a, b) => {
                if (!a.start) return 1;
                if (!b.start) return -1;
                return a.start - b.start;
            });

            buildFilters();
            render();
        } catch (err) {
            console.error(err);
            document.getElementById('list').innerHTML =
                '<div class="empty"><h3>⚠️ Could not load events</h3><p>Check that the Google Apps Script URL is correct and deployed for "Anyone".</p></div>';
            document.getElementById('pager').innerHTML = '';
        }
    }

    // ---------- filters UI ----------
    function buildFilters() {
        const types = [...new Set(events.map(e => e.type))].sort();
        const audiences = [...new Set(events.flatMap(e => splitList(e.audience)))].sort();

        const box = document.getElementById('filters');
        box.innerHTML = '';

        // "All" pill
        const all = document.createElement('button');
        all.className = 'pill' + (activeTypes.size === 0 ? ' active' : '');
        all.textContent = 'All';
        all.onclick = () => { activeTypes.clear(); currentPage = 1; render(); };
        box.appendChild(all);

        // type pills
        types.forEach(t => {
            const b = document.createElement('button');
            b.className = 'pill' + (activeTypes.has(t) ? ' active' : '');
            b.textContent = t;
            b.onclick = () => {
                activeTypes.has(t) ? activeTypes.delete(t) : activeTypes.add(t);
                currentPage = 1; render();
            };
            box.appendChild(b);
        });

        // + filters (audience)
        if (audiences.length) {
            const menu = document.createElement('div');
            menu.className = 'filter-menu';

            const trigger = document.createElement('button');
            trigger.className = 'pill more' + (activeAudiences.size ? ' active' : '');
            trigger.innerHTML = '+ Audience' + (activeAudiences.size ? ' (' + activeAudiences.size + ')' : '');

            const dd = document.createElement('div');
            dd.className = 'dropdown';
            dd.innerHTML = '<h4>Target audience</h4>';
            audiences.forEach(a => {
                const lbl = document.createElement('label');
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = activeAudiences.has(a);
                cb.onchange = () => {
                    cb.checked ? activeAudiences.add(a) : activeAudiences.delete(a);
                    currentPage = 1; render();
                };
                lbl.appendChild(cb);
                lbl.appendChild(document.createTextNode(a));
                dd.appendChild(lbl);
            });

            trigger.onclick = (e) => { e.stopPropagation(); dd.classList.toggle('open'); };
            document.addEventListener('click', () => dd.classList.remove('open'));
            dd.onclick = (e) => e.stopPropagation();

            menu.appendChild(trigger);
            menu.appendChild(dd);
            box.appendChild(menu);
        }
    }

    // ---------- filtering ----------
    function getFiltered() {
        return events.filter(e => {
            if (activeTypes.size && !activeTypes.has(e.type)) return false;
            if (activeAudiences.size) {
                const evAud = splitList(e.audience);
                if (![...activeAudiences].some(a => evAud.includes(a))) return false;
            }
            if (searchTerm) {
                const hay = (e.name + ' ' + e.description + ' ' + e.topics).toLowerCase();
                if (!hay.includes(searchTerm)) return false;
            }
            return true;
        });
    }

    // ---------- render ----------
    function render() {
        buildFilters();
        const filtered = getFiltered();
        document.getElementById('totalCount').textContent = filtered.length;

        // pagination
        const pp = perPage === Infinity ? filtered.length || 1 : perPage;
        const totalPages = Math.max(1, Math.ceil(filtered.length / pp));
        if (currentPage > totalPages) currentPage = totalPages;
        const pageItems = filtered.slice((currentPage - 1) * pp, currentPage * pp);

        const list = document.getElementById('list');

        if (!filtered.length) {
            list.innerHTML = '<div class="empty"><h3>No events found</h3><p>Try removing a filter or clearing the search.</p></div>';
            document.getElementById('pager').innerHTML = '';
            return;
        }

        // group current page by type
        const groups = {};
        pageItems.forEach(e => { (groups[e.type] = groups[e.type] || []).push(e); });

        list.innerHTML = '';
        Object.keys(groups).forEach(type => {
            const items = groups[type];
            const collapsed = collapsedTypes.has(type);

            const group = document.createElement('div');
            group.className = 'group' + (collapsed ? ' collapsed' : '');

            // header
            const head = document.createElement('div');
            head.className = 'group-head';
            head.innerHTML =
                '<div class="group-name">' + escapeHtml(type) + '</div>' +
                '<div class="badge">' + items.length + '</div>' +
                '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
            head.onclick = () => {
                collapsedTypes.has(type) ? collapsedTypes.delete(type) : collapsedTypes.add(type);
                render();
            };
            group.appendChild(head);

            // body
            const body = document.createElement('div');
            body.className = 'group-body';
            items.forEach(e => body.appendChild(eventEl(e)));
            group.appendChild(body);

            list.appendChild(group);

            // set max-height for smooth open
            if (!collapsed) body.style.maxHeight = body.scrollHeight + 2000 + 'px';
        });

        renderPager(totalPages);
    }

    function eventEl(e) {
        const wrap = document.createElement('div');
        wrap.className = 'event' + (openEventIds.has(e._id) ? ' open' : '');

        const row = document.createElement('div');
        row.className = 'event-row';
        row.innerHTML =
            '<div class="event-title">' + escapeHtml(e.name) + '</div>' +
            '<div class="event-date">' + escapeHtml(dateRange(e)) + '</div>' +
            '<svg class="event-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>';
        row.onclick = () => {
            openEventIds.has(e._id) ? openEventIds.delete(e._id) : openEventIds.add(e._id);
            render();
        };

        const detail = document.createElement('div');
        detail.className = 'detail';
        detail.innerHTML = detailHtml(e);

        wrap.appendChild(row);
        wrap.appendChild(detail);
        return wrap;
    }

    function detailHtml(e) {
        const meta = [];
        if (e.time) meta.push(metaItem('Time', escapeHtml(e.time)));
        if (e.location) meta.push(metaItem('Location', escapeHtml(e.location)));
        if (e.organizer) meta.push(metaItem('Organizer', escapeHtml(e.organizer)));
        if (e.email) meta.push(metaItem('Contact', '<a href="mailto:' + escapeHtml(e.email) + '">' + escapeHtml(e.email) + '</a>'));
        if (e.audience) meta.push(metaItem('Audience', escapeHtml(splitList(e.audience).join(' · '))));
        if (e.notes) meta.push(metaItem('Notes', escapeHtml(e.notes)));

        const topics = splitList(e.topics);
        const topicsHtml = topics.length
            ? '<div class="topics">' + topics.map(t => '<span class="topic">' + escapeHtml(t) + '</span>').join('') + '</div>'
            : '';

        const reg = e.registration
            ? '<a class="register" href="' + escapeHtml(e.registration) + '" target="_blank" rel="noopener">Register / More info →</a>'
            : '';

        return '<div class="detail-inner"><div class="detail-card">' +
            (e.description ? '<div class="detail-desc">' + escapeHtml(e.description) + '</div>' : '') +
            (meta.length ? '<div class="meta-grid">' + meta.join('') + '</div>' : '') +
            topicsHtml + reg +
            '</div></div>';
    }

    function metaItem(k, v) {
        return '<div class="meta-item"><span class="k">' + k + '</span><span class="v">' + v + '</span></div>';
    }

    function renderPager(totalPages) {
        const pager = document.getElementById('pager');
        if (totalPages <= 1) { pager.innerHTML = ''; return; }
        pager.innerHTML = '';

        const prev = document.createElement('button');
        prev.innerHTML = '‹';
        prev.disabled = currentPage === 1;
        prev.onclick = () => { currentPage--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
        pager.appendChild(prev);

        for (let p = 1; p <= totalPages; p++) {
            const b = document.createElement('button');
            b.textContent = p;
            if (p === currentPage) b.className = 'current';
            b.onclick = () => { currentPage = p; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
            pager.appendChild(b);
        }

        const next = document.createElement('button');
        next.innerHTML = '›';
        next.disabled = currentPage === totalPages;
        next.onclick = () => { currentPage++; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
        pager.appendChild(next);
    }

    // ---------- listeners ----------
    document.getElementById('search').addEventListener('input', (e) => {
        searchTerm = e.target.value.toLowerCase().trim();
        currentPage = 1; render();
    });
    document.getElementById('perPage').addEventListener('change', (e) => {
        perPage = e.target.value === 'all' ? Infinity : parseInt(e.target.value, 10);
        currentPage = 1; render();
    });

    init();
</script>
</body>
</html>
