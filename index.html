<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChallengeEU Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a1a;
            --accent: #ff6633;
            --accent-light: #ffe6d9;
            --text: #333333;
            --text-light: #666666;
            --border: #e0e0e0;
            --bg: #f9f9f9;
            --bg-card: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #f5f5f5 100%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: slideDown 0.6s ease-out;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 1rem;
            color: var(--primary);
            letter-spacing: -1px;
        }

        .logo-accent {
            color: var(--accent);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: var(--primary);
        }

        .subtitle {
            color: var(--text-light);
            font-size: 0.95rem;
            font-weight: 400;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2.5rem;
            animation: slideUp 0.6s ease-out 0.1s both;
            background: var(--bg-card);
            padding: 1.75rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        label {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input[type="text"],
        input[type="date"],
        select {
            padding: 0.65rem 0.85rem;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: var(--bg-card);
            color: var(--text);
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            grid-column: 1 / -1;
        }

        button {
            padding: 0.65rem 1.2rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            flex: 1;
            min-width: 120px;
        }

        button:hover {
            background: #e55a22;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 102, 51, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .reset-btn {
            background: #a0a0a0;
            flex: 0 1 auto;
            min-width: auto;
        }

        .reset-btn:hover {
            background: #888888;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 2.5rem;
            animation: slideUp 0.6s ease-out 0.2s both;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 0.25rem;
        }

        .timeline {
            position: relative;
            padding: 2rem 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--accent) 0%, rgba(255, 102, 51, 0.3) 100%);
            transform: translateX(-50%);
        }

        .timeline-item {
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .timeline-item:nth-child(1) { animation-delay: 0.1s; }
        .timeline-item:nth-child(2) { animation-delay: 0.2s; }
        .timeline-item:nth-child(3) { animation-delay: 0.3s; }
        .timeline-item:nth-child(n+4) { animation-delay: 0.4s; }

        .timeline-item:nth-child(odd) {
            margin-left: 0;
            margin-right: 52%;
            text-align: right;
        }

        .timeline-item:nth-child(even) {
            margin-left: 52%;
            margin-right: 0;
            text-align: left;
        }

        .timeline-marker {
            position: absolute;
            left: 50%;
            top: 1rem;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border: 4px solid white;
            border-radius: 50%;
            transform: translateX(-50%);
            z-index: 2;
            box-shadow: 0 0 0 2px var(--accent);
            transition: all 0.3s ease;
        }

        .timeline-item:hover .timeline-marker {
            width: 24px;
            height: 24px;
            top: 0.6rem;
            box-shadow: 0 0 0 3px var(--accent), 0 0 20px rgba(255, 102, 51, 0.4);
        }

        .timeline-content {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }

        .timeline-item:hover .timeline-content {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }

        .timeline-item:nth-child(even) .timeline-content {
            border-left: none;
            border-right: 4px solid var(--accent);
        }

        .event-date {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.4rem;
        }

        .event-time {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 0.6rem;
        }

        .event-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: var(--primary);
        }

        .event-category {
            display: inline-block;
            background: var(--accent-light);
            color: var(--accent);
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.9rem;
        }

        .event-description {
            color: var(--text-light);
            margin-bottom: 0.9rem;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .event-meta {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .meta-item {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            color: var(--text-light);
        }

        .meta-icon {
            color: var(--accent);
            font-weight: 700;
            min-width: 18px;
        }

        .event-link {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border: 2px solid var(--accent);
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .event-link:hover {
            background: var(--accent);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-light);
        }

        .empty-state h2 {
            color: var(--text);
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .timeline::before {
                left: 15px;
            }

            .timeline-item:nth-child(odd),
            .timeline-item:nth-child(even) {
                margin-left: 55px;
                margin-right: 0;
                text-align: left;
            }

            .timeline-marker {
                left: 15px;
            }

            .timeline-content {
                border-left: 4px solid var(--accent);
                border-right: none;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-column: 1;
            }

            .stats {
                flex-direction: column;
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Challenge<span class="logo-accent">EU</span></div>
            <h1>Events Timeline</h1>
            <p class="subtitle">Discover upcoming events and opportunities</p>
        </header>

        <div class="controls">
            <div class="filter-group">
                <label for="searchInput">🔍 Search</label>
                <input type="text" id="searchInput" placeholder="Search events...">
            </div>

            <div class="filter-group">
                <label for="dateFromInput">📅 From</label>
                <input type="date" id="dateFromInput">
            </div>

            <div class="filter-group">
                <label for="dateToInput">📅 To</label>
                <input type="date" id="dateToInput">
            </div>

            <div class="filter-group">
                <label for="locationFilter">📍 Location</label>
                <select id="locationFilter">
                    <option value="">All Locations</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="membersFilter">👥 Members</label>
                <select id="membersFilter">
                    <option value="">All Members</option>
                </select>
            </div>

            <div class="button-group">
                <button onclick="applyFilters()">Apply Filters</button>
                <button class="reset-btn" onclick="resetFilters()">Reset</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalEvents">0</div>
                <div class="stat-label">Total Events</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="filteredEvents">0</div>
                <div class="stat-label">Showing</div>
            </div>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading events...</p>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANT: Replace this with your actual Google Apps Script deployment URL
        const SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';

        let allEvents = [];
        let filteredEvents = [];
        let isFiltered = false;

        // Initialize the page
        async function init() {
            try {
                await fetchEvents();
                populateFilters();
                displayUpcomingEvents();
            } catch (error) {
                console.error('Error initializing:', error);
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <h2>⚠️ Error Loading Events</h2>
                        <p>Make sure you've configured the Google Apps Script URL correctly.</p>
                        <p style="margin-top: 1rem; font-size: 0.9rem;">
                            Current URL: <code>${SCRIPT_URL}</code>
                        </p>
                    </div>
                `;
            }
        }

        // Fetch events from Google Apps Script
        async function fetchEvents() {
            const response = await fetch(SCRIPT_URL);
            if (!response.ok) throw new Error('Failed to fetch events');
            allEvents = await response.json();

            // Sort by date
            allEvents.sort((a, b) => {
                const dateA = new Date(a.Date);
                const dateB = new Date(b.Date);
                return dateA - dateB;
            });
        }

        // Display only upcoming events by default
        function displayUpcomingEvents() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            filteredEvents = allEvents.filter(event => {
                const eventDate = new Date(event.Date);
                eventDate.setHours(0, 0, 0, 0);
                return eventDate >= today;
            });

            isFiltered = false;
            renderTimeline();
        }

        // Populate dropdown filters
        function populateFilters() {
            const locations = new Set();
            const members = new Set();

            allEvents.forEach(event => {
                if (event.Location) locations.add(event.Location);
                if (event.Members) {
                    event.Members.split(',').forEach(m => members.add(m.trim()));
                }
            });

            const locationSelect = document.getElementById('locationFilter');
            const membersSelect = document.getElementById('membersFilter');

            locations.forEach(loc => {
                const option = document.createElement('option');
                option.value = loc;
                option.textContent = loc;
                locationSelect.appendChild(option);
            });

            members.forEach(member => {
                const option = document.createElement('option');
                option.value = member;
                option.textContent = member;
                membersSelect.appendChild(option);
            });
        }

        // Apply filters and search
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const dateFrom = document.getElementById('dateFromInput').value;
            const dateTo = document.getElementById('dateToInput').value;
            const location = document.getElementById('locationFilter').value;
            const member = document.getElementById('membersFilter').value;

            filteredEvents = allEvents.filter(event => {
                // Search filter
                const matchesSearch = !searchTerm || 
                    event.Title.toLowerCase().includes(searchTerm) ||
                    (event.Description || '').toLowerCase().includes(searchTerm);

                // Date filters
                const eventDate = new Date(event.Date);
                const matchesDateFrom = !dateFrom || eventDate >= new Date(dateFrom);
                const matchesDateTo = !dateTo || eventDate <= new Date(dateTo);

                // Location filter
                const matchesLocation = !location || event.Location === location;

                // Members filter
                const matchesMembers = !member || (event.Members || '').includes(member);

                return matchesSearch && matchesDateFrom && matchesDateTo && matchesLocation && matchesMembers;
            });

            isFiltered = true;
            renderTimeline();
        }

        // Render the timeline
        function renderTimeline() {
            const content = document.getElementById('content');
            document.getElementById('totalEvents').textContent = allEvents.length;
            document.getElementById('filteredEvents').textContent = filteredEvents.length;

            if (filteredEvents.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <h2>No events found</h2>
                        <p>${isFiltered ? 'Try adjusting your filters or search terms.' : 'No upcoming events at the moment.'}</p>
                    </div>
                `;
                return;
            }

            const timeline = document.createElement('div');
            timeline.className = 'timeline';

            filteredEvents.forEach(event => {
                const item = document.createElement('div');
                item.className = 'timeline-item';

                const eventDate = new Date(event.Date);
                const formattedDate = eventDate.toLocaleDateString('de-DE', {
                    weekday: 'short',
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                });

                let membersHTML = '';
                if (event.Members) {
                    membersHTML = `<div class="meta-item"><span class="meta-icon">👥</span><strong>Members:</strong> ${event.Members}</div>`;
                }

                let locationHTML = '';
                if (event.Location) {
                    locationHTML = `<div class="meta-item"><span class="meta-icon">📍</span><strong>Location:</strong> ${event.Location}</div>`;
                }

                let linkHTML = '';
                if (event.Link) {
                    linkHTML = `<a href="${event.Link}" target="_blank" rel="noopener noreferrer" class="event-link">Learn More →</a>`;
                }

                let categoryHTML = '';
                if (event.Category) {
                    categoryHTML = `<div class="event-category">${event.Category}</div>`;
                }

                item.innerHTML = `
                    <div class="timeline-marker"></div>
                    <div class="timeline-content">
                        <div class="event-date">${formattedDate}</div>
                        ${event.Time ? `<div class="event-time">⏰ ${event.Time}</div>` : ''}
                        <div class="event-title">${event.Title}</div>
                        ${categoryHTML}
                        ${event.Description ? `<div class="event-description">${event.Description}</div>` : ''}
                        <div class="event-meta">
                            ${locationHTML}
                            ${membersHTML}
                        </div>
                        ${linkHTML}
                    </div>
                `;

                timeline.appendChild(item);
            });

            content.innerHTML = '';
            content.appendChild(timeline);
        }

        // Reset all filters and show upcoming events
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('dateFromInput').value = '';
            document.getElementById('dateToInput').value = '';
            document.getElementById('locationFilter').value = '';
            document.getElementById('membersFilter').value = '';
            displayUpcomingEvents();
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
